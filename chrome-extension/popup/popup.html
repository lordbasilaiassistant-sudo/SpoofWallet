<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 340px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0f;
      color: #e0e0e8;
      padding: 16px;
    }
    h1 {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .subtitle {
      font-size: 11px;
      color: #888898;
      margin-bottom: 16px;
    }
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      padding: 10px 12px;
      background: #12121a;
      border: 1px solid #1e1e2e;
      border-radius: 8px;
    }
    .toggle-label {
      font-size: 13px;
      font-weight: 600;
    }
    .switch {
      position: relative;
      width: 44px;
      height: 24px;
    }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute;
      inset: 0;
      background: #333;
      border-radius: 24px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .slider::before {
      content: '';
      position: absolute;
      width: 18px;
      height: 18px;
      left: 3px;
      bottom: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    .switch input:checked + .slider { background: #6c5ce7; }
    .switch input:checked + .slider::before { transform: translateX(20px); }
    label.field-label {
      display: block;
      font-size: 11px;
      color: #888898;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 4px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px 10px;
      background: rgba(0,0,0,0.3);
      border: 1px solid #1e1e2e;
      border-radius: 6px;
      color: #e0e0e8;
      font-family: 'SF Mono', 'Consolas', monospace;
      font-size: 12px;
      outline: none;
      margin-bottom: 12px;
    }
    input[type="text"]:focus { border-color: #6c5ce7; }
    input[type="text"]::placeholder { color: #555; }
    .status {
      text-align: center;
      padding: 8px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
    }
    .status.active {
      background: rgba(108, 92, 231, 0.15);
      color: #6c5ce7;
      border: 1px solid rgba(108, 92, 231, 0.3);
    }
    .status.inactive {
      background: rgba(255,255,255,0.05);
      color: #888898;
      border: 1px solid #1e1e2e;
    }
    .warn {
      font-size: 10px;
      color: #ff9100;
      text-align: center;
      margin-top: 12px;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <h1>Spoof Wallet</h1>
  <p class="subtitle">Intercept window.ethereum — educational use only</p>

  <div class="toggle-row">
    <span class="toggle-label">Spoof Active</span>
    <label class="switch">
      <input type="checkbox" id="toggle">
      <span class="slider"></span>
    </label>
  </div>

  <label class="field-label">Spoof Address (pretend to be this wallet)</label>
  <input type="text" id="address" placeholder="0x..." spellcheck="false">

  <div id="status" class="status inactive">Spoof disabled</div>

  <p class="warn">Spoofing only affects what the dApp sees (eth_accounts). On-chain transactions are still signed by your real wallet. msg.sender cannot be faked.</p>

  <script src="popup.js"></script>
</body>
</html>
